name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff check)
        run: ruff check pyGigEVision tests
      - name: Lint (ruff format check)
        run: ruff format --check pyGigEVision tests
      - name: Run tests
        run: pytest -v
